<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Registration</title>
</head>
<body>
  <h1>ระบบลงทะเบียน</h1>
  <p id="status">กำลังตรวจสอบการเชื่อมต่อ...</p>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // --- แก้ไข ID ให้เป็นของคุณ ---
    const LIFF_ID = "2010419960-jJFrolbW"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzBNUP8mNvVmKERWOrmGF7FxdMETlxzS5YIIrNQHeZJpJWuKTZNahdDjAVqAVJSnGPwWw/exec"; 

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        // ทดสอบส่งข้อมูลไปหา GAS
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: "test" })
        });
        
        const data = await response.json();
        // ถ้าเชื่อมต่อสำเร็จ จะแสดงข้อความจาก GAS
        document.getElementById('status').innerText = "สถานะ: " + data.message;
        
      } catch (err) {
        document.getElementById('status').innerText = "เกิดข้อผิดพลาด: " + err.message;
      }
    }
    initLiff();
  </script>
</body>
</html>
