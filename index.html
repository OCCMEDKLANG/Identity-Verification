<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงทะเบียนผูกบัญชี</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; } </style>
</head>
<body class="p-4 pb-20">

  <div id="loading" class="text-center mt-20">
    <div class="animate-spin inline-block w-10 h-10 border-[4px] border-green-600 border-t-transparent rounded-full" role="status"></div>
    <p class="mt-4 text-gray-600">กำลังเชื่อมต่อข้อมูล...</p>
  </div>

  <div id="verifySection" class="hidden max-w-md mx-auto bg-white p-6 rounded-xl shadow-md mt-4">
    <h2 class="text-xl font-bold mb-2 text-gray-800">🔒 ยืนยันตัวตน</h2>
    <p class="text-sm text-gray-500 mb-6">กรุณาระบุวันเดือนปีเกิดของท่านเพื่อเข้าดูข้อมูลส่วนบุคคล</p>
    
    <div class="relative mb-4">
      <input type="text" id="v_dob" placeholder="วว/ดด/ปปปป (เช่น 01/01/2542)" maxlength="10" oninput="formatDate(this)" class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
      <input type="date" class="absolute top-0 right-0 w-10 h-full opacity-0 cursor-pointer" onchange="syncDate(this, 'v_dob')">
      <div class="absolute right-3 top-3 pointer-events-none text-gray-400">📅</div>
    </div>

    <button onclick="verifyDOB()" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg hover:bg-blue-700">ตรวจสอบข้อมูล</button>
  </div>

  <div id="formSection" class="hidden max-w-md mx-auto bg-white p-6 rounded-xl shadow-md mt-4">
    <h2 id="formTitle" class="text-xl font-bold mb-4 text-gray-800">📝 ลงทะเบียนผูกบัญชี</h2>
    <div class="space-y-4">
      
      <!-- คำนำหน้า และ ชื่อ-สกุล -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">ชื่อ-นามสกุล <span class="text-red-500">*</span></label>
        <select id="f_prefix" onchange="togglePrefix()" class="w-full border p-2 rounded-lg bg-white mb-2">
          <option value="">-- เลือกคำนำหน้า --</option>
          <option value="นาย">นาย</option>
          <option value="นาง">นาง</option>
          <option value="นางสาว">นางสาว</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
        <input type="text" id="f_other_prefix" placeholder="โปรดระบุคำนำหน้า" class="w-full border p-2 rounded-lg mb-2 hidden">
        <div class="flex gap-2">
          <input type="text" id="f_firstname" placeholder="ชื่อจริง" class="w-full border p-2 rounded-lg">
          <input type="text" id="f_lastname" placeholder="นามสกุล" class="w-full border p-2 rounded-lg">
        </div>
      </div>

      <!-- เลขบัตร 13 หลัก -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">เลขบัตรประชาชน 13 หลัก <span class="text-red-500">*</span></label>
        <input type="text" id="f_idCard" class="w-full border p-2 rounded-lg" maxlength="13" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
      </div>

      <!-- วันเกิด -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">วันเกิด (วว/ดด/ปปปป พ.ศ.) <span class="text-red-500">*</span></label>
        <div class="relative">
          <input type="text" id="f_dob" placeholder="เช่น 01/01/2542" maxlength="10" oninput="formatDate(this)" class="w-full border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
          <input type="date" class="absolute top-0 right-0 w-10 h-full opacity-0 cursor-pointer" onchange="syncDate(this, 'f_dob')">
          <div class="absolute right-3 top-2 pointer-events-none text-gray-400">📅</div>
        </div>
      </div>

      <!-- เบอร์โทร 10 หลัก -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">เบอร์โทรศัพท์มือถือ 10 หลัก <span class="text-red-500">*</span></label>
        <input type="tel" id="f_phone" class="w-full border p-2 rounded-lg" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
      </div>

      <!-- ตำแหน่ง -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">ตำแหน่ง <span class="text-red-500">*</span></label>
        <input type="text" id="f_position" class="w-full border p-2 rounded-lg">
      </div>

      <!-- ประเภทบุคลากร -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">ประเภทบุคลากร <span class="text-red-500">*</span></label>
        <select id="f_type" class="w-full border p-2 rounded-lg bg-white">
          <option value="">-- เลือกประเภท --</option>
          <option value="ข้าราชการ">ข้าราชการ</option>
          <option value="ลูกจ้างประจำ">ลูกจ้างประจ</option>
          <option value="ลูกจ้างชั่วคราว">ลูกจ้างชั่วคราว</option>
          <option value="พนักงานประกันสังคม">พนักงานประกันสังคม</option>
          <option value="ลูกจ้างรายวัน">ลูกจ้างรายวัน</option>
          <option value="ลูกจ้างรายวัน (สายการแพทย์)">ลูกจ้างรายวัน (สายการแพทย์)</option>
          <option value="ลูกจ้างห้วงเวลา">ลูกจ้างห้วงเวลา</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
      </div>

      <!-- หน่วยงาน -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">หน่วยงานที่ปฏิบัติงานจริง <span class="text-red-500">*</span></label>

          <option value="">-- เลือกหน่วยงาน --</option>

          <option value="หน่วยงานอุบัติเหตุและฉุกเฉิน">หน่วยงานอุบัติเหตุและฉุกเฉิน</option>
          <option value="กลุ่มงานบริการการแพทย์ฉุกเฉินและรับส่งต่อ">กลุ่มงานบริการการแพทย์ฉุกเฉินและรับส่งต่อ</option>

          <option value="ศูนย์ส่องกล้อง">ศูนย์ส่องกล้อง</option>
          <option value="หน่วยแพทย์กู้ชีวิต">หน่วยแพทย์กู้ชีวิต</option>
          <option value="ห้องตรวจศัลยกรรมกระดูก">ห้องตรวจศัลยกรรมกระดูก</option>

          <option value="ห้องตรวจโรคตา">ห้องตรวจโรคตา</option>
          <option value="ห้องตรวจกุมารเวชกรรมทั่วไป">ห้องตรวจกุมารเวชกรรมทั่วไป</option>
          <option value="ห้องตรวจสูตินรีเวชกรรม (ANC)">ห้องตรวจสูตินรีเวชกรรม (ANC)</option>

          <option value="หอผู้ป่วยหนักระบบทางเดินหายใจ (RCU)">หอผู้ป่วยหนักระบบทางเดินหายใจ (RCU)</option>
          <option value="หอผู้ป่วยหนักศัลยกรรม (SICU)">หอผู้ป่วยหนักศัลยกรรม (SICU)</option>

          <option value="กลุ่มงานอาชีวเวชกรรม">กลุ่มงานอาชีวเวชกรรม</option>

          <option value="ฝ่ายบริหารงานทั่วไป">ฝ่ายบริหารงานทั่วไป</option>
          <option value="ศูนย์โทรศัพท์กลาง">ศูนย์โทรศัพท์กลาง</option>
          <option value="สำนักงานผู้บริหาร">สำนักงานผู้บริหาร</option>
          <option value="งานเวชนิทัศน์">งานเวชนิทัศน์</option>
          <option value="ศูนย์ UMSC">ศูนย์ UMSC</option>
          <option value="กลุ่มงานแพทยศาสตร์ศึกษา">กลุ่มงานแพทยศาสตร์ศึกษา</option>
          <option value="จุดคัดกรอง">จุดคัดกรอง</option>
          <option value="ฝ่ายโภชนาการ">ฝ่ายโภชนาการ</option>
          <option value="ฝ่ายซ่อมบำรุงและกำจัดของเสีย">ฝ่ายซ่อมบำรุงและกำจัดของเสีย</option>
          <option value="ศูนย์เปล">ศูนย์เปล</option>
          <option value="ห้องสีฟ้า">ห้องสีฟ้า</option>

    </div>

    <button id="btnSave" onclick="saveData()" class="w-full bg-green-600 text-white font-bold p-3 rounded-lg mt-8 hover:bg-green-700">บันทึกข้อมูล</button>
    <button id="btnUnlink" onclick="unlinkAccount()" class="w-full bg-red-100 text-red-600 font-bold p-3 rounded-lg mt-3 hover:bg-red-200 hidden">ยกเลิกการผูกบัญชี (ลบข้อมูล)</button>
  </div>

  <script>
    const LIFF_ID = "2010419960-jJFrolbW";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwqpHVKFKzCP_ICyDtdltZ4Nk-foKmytN92nT5YFPzH0wJoxfWlZ1Y0i6MiAFVdBZosdw/exec";
    let globalUserId = null;

    // การสร้างฟอร์แมตวันเกิด (พิมพ์แล้วเติมสแลชให้อัตโนมัติ)
    function formatDate(input) {
      let v = input.value.replace(/\D/g, '');
      if (v.length > 8) v = v.substring(0, 8);
      if (v.length >= 5) {
        input.value = `${v.substring(0,2)}/${v.substring(2,4)}/${v.substring(4)}`;
      } else if (v.length >= 3) {
        input.value = `${v.substring(0,2)}/${v.substring(2)}`;
      } else {
        input.value = v;
      }
    }

    // ซิงก์ปฏิทิน (แปลง ค.ศ. เป็น พ.ศ.)
    function syncDate(dateInput, targetId) {
      if (!dateInput.value) return;
      const parts = dateInput.value.split('-'); 
      if (parts.length === 3) {
        const year = parseInt(parts[0]) + 543;
        document.getElementById(targetId).value = `${parts[2]}/${parts[1]}/${year}`;
      }
    }

    // ซ่อน/แสดง ช่องระบุคำนำหน้าอื่นๆ
    function togglePrefix() {
      const val = document.getElementById('f_prefix').value;
      const otherInput = document.getElementById('f_other_prefix');
      if (val === "อื่นๆ") {
        otherInput.classList.remove("hidden");
      } else {
        otherInput.classList.add("hidden");
        otherInput.value = "";
      }
    }

    async function callAPI(action, data = {}) {
      const payloadString = JSON.stringify({ action: action, ...data });
      const response = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: payloadString
      });
      return await response.json();
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        
        const profile = await liff.getProfile();
        globalUserId = profile.userId;
        
        callAPI('checkUserLinkStatus', { userId: globalUserId })
          .then(res => {
            document.getElementById('loading').classList.add('hidden');
            if (res && res.isLinked) {
              document.getElementById('verifySection').classList.remove('hidden');
            } else {
              document.getElementById('formSection').classList.remove('hidden');
            }
          })
          .catch(err => {
            document.getElementById('loading').classList.add('hidden');
            Swal.fire("ข้อผิดพลาด", err.message, "error");
          });
      } catch (err) {
        document.getElementById('loading').classList.add('hidden');
        Swal.fire("LIFF Error", err.message, "error");
      }
    }

    function verifyDOB() {
      const dob = document.getElementById('v_dob').value.trim();
      if (!dob) { Swal.fire('แจ้งเตือน', 'กรุณากรอกวันเดือนปีเกิด', 'warning'); return; }
      
      Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
      
      callAPI('verifyAndGetUserData', { userId: globalUserId, dob: dob })
        .then(res => {
          if (res.success) {
            Swal.close();
            document.getElementById('verifySection').classList.add('hidden');
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('formTitle').innerText = "⚙️ จัดการข้อมูลบัญชี";
            
            // แยกชื่อให้ตอนแก้ไข
            let fullName = res.data.name;
            let prefix = "อื่นๆ";
            let fname = fullName;
            let lname = "";
            const prefixes = ["นาย", "นางสาว", "นาง"];
            for (let p of prefixes) {
              if (fullName.startsWith(p)) {
                prefix = p;
                let rest = fullName.substring(p.length).trim();
                let parts = rest.split(' ');
                fname = parts[0] || '';
                lname = parts.slice(1).join(' ') || '';
                break;
              }
            }
            document.getElementById('f_prefix').value = prefix;
            togglePrefix();
            if (prefix === "อื่นๆ") document.getElementById('f_other_prefix').value = fname; // ใส่ก้อนเดิมไว้ให้แก้
            else {
              document.getElementById('f_firstname').value = fname;
              document.getElementById('f_lastname').value = lname;
            }

            document.getElementById('f_idCard').value = res.data.idCard;
            document.getElementById('f_position').value = res.data.position;
            document.getElementById('f_type').value = res.data.type;
            document.getElementById('f_dept').value = res.data.dept;
            document.getElementById('f_dob').value = res.data.dob;
            document.getElementById('f_phone').value = res.data.phone;
            
            document.getElementById('btnSave').innerText = "อัปเดตข้อมูล";
            document.getElementById('btnUnlink').classList.remove('hidden');
          } else { 
            Swal.fire('ข้อมูลไม่ถูกต้อง', res.message, 'error'); 
          }
        }).catch(err => { Swal.fire('เกิดข้อผิดพลาด', err.message, 'error'); });
    }

    function saveData() {
      // ประกอบชื่อ
      let prefix = document.getElementById('f_prefix').value;
      if (prefix === 'อื่นๆ') prefix = document.getElementById('f_other_prefix').value.trim();
      let fname = document.getElementById('f_firstname').value.trim();
      let lname = document.getElementById('f_lastname').value.trim();
      let combinedName = `${prefix}${fname} ${lname}`.trim();

      const idCard = document.getElementById('f_idCard').value.trim();
      const position = document.getElementById('f_position').value.trim();
      const type = document.getElementById('f_type').value;
      const dept = document.getElementById('f_dept').value;
      const dob = document.getElementById('f_dob').value.trim();
      const phone = document.getElementById('f_phone').value.trim();

      // บังคับกรอกทุกช่อง
      if (!prefix || !fname || !lname || !idCard || !position || !type || !dept || !dob || !phone) {
        Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบทุกช่อง', 'warning'); return;
      }

      // ตรวจสอบเงื่อนไขตัวเลขและวันที่
      if (idCard.length !== 13 || !/^\d{13}$/.test(idCard)) {
        Swal.fire('แจ้งเตือน', 'เลขบัตรประชาชนต้องเป็นตัวเลข 13 หลัก', 'warning'); return;
      }
      if (phone.length !== 10 || !/^\d{10}$/.test(phone)) {
        Swal.fire('แจ้งเตือน', 'เบอร์โทรศัพท์ต้องเป็นมือถือ 10 หลัก', 'warning'); return;
      }
      if (!/^(0[1-9]|[12][0-9]|3[01])\/(0[1-9]|1[0-2])\/\d{4}$/.test(dob)) {
        Swal.fire('แจ้งเตือน', 'รูปแบบวันเกิดไม่ถูกต้อง (เช่น 01/01/2542)', 'warning'); return;
      }

      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
      
      const data = { name: combinedName, idCard: idCard, position: position, type: type, dept: dept, dob: dob, phone: phone };

      callAPI('saveUserData', { userId: globalUserId, formData: data })
        .then(res => {
          if (res.success) {
            Swal.fire('สำเร็จ!', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success').then(() => {
              liff.sendMessages([{ type: 'text', text: 'ฉันกรอกข้อมูลลงทะเบียน/อัปเดตข้อมูลเรียบร้อยแล้ว' }])
                  .then(() => liff.closeWindow());
            });
          } else { 
            Swal.fire('ล้มเหลว', res.message, 'error'); 
          }
        }).catch(err => { Swal.fire('บันทึกล้มเหลว', err.message, 'error'); });
    }

    function unlinkAccount() {
      Swal.fire({
        title: 'ยืนยันการยกเลิก?', text: "ระบบจะลบข้อมูลการผูกบัญชีของคุณ", icon: 'warning',
        showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ยกเลิกการผูกบัญชี'
      }).then((result) => {
        if (result.isConfirmed) {
          callAPI('unlinkUserData', { userId: globalUserId }).then(res => {
            if (res.success) Swal.fire('สำเร็จ', 'ลบข้อมูลเรียบร้อย', 'success').then(() => { window.location.reload(); });
          });
        }
      });
    }

    main();
  </script>
