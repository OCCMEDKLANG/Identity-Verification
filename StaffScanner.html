<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สแกนเนอร์สำหรับเจ้าหน้าที่</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #1f2937; color: white; }
    #reader { border: none !important; border-radius: 1rem; overflow: hidden; }
    #reader__scan_region { background-color: black; }
    #reader__dashboard_section_csr button { background-color: #2563eb !important; color: white !important; padding: 10px 20px !important; border-radius: 8px !important; border: none !important; font-family: 'Sarabun', sans-serif !important; font-weight: bold !important; margin: 10px 0; }
  </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-gray-800 rounded-3xl shadow-2xl p-6 border-t-4 border-blue-500">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-blue-400">ระบบเจ้าหน้าที่ 👮‍♂️</h1>
      <p class="text-gray-400 text-sm mt-1">สแกน Aerobic Dance STAMP (โหมดทดสอบ)</p>
    </div>

    <div class="bg-black rounded-2xl shadow-inner mb-6 overflow-hidden">
      <div id="reader" width="100%"></div>
    </div>

    <div class="text-center">
      <p id="statusMsg" class="text-yellow-400 font-semibold animate-pulse">กำลังรอกล้องทำงาน...</p>
    </div>
  </div>

  <script>
    // ⚠️ ใส่ URL Backend ของระบบแสตมป์ ที่ Deploy ใหม่ (อันเดียวกับหน้า UserStamp)
    const GAS_BACKEND_URL = "https://script.google.com/macros/s/AKfycbwe0c85_shFvZ8UnH1Rqk1GLDc33xsWqNlUXuRi2ezkaIb9IBXKyn2HXXXP8Z70IpWo/exec"; 
    
    let html5QrcodeScanner = null;
    let isProcessing = false; 

    async function callBackend(action, data = {}) {
      const payloadString = JSON.stringify({ action: action, ...data });
      const response = await fetch(GAS_BACKEND_URL, { method: 'POST', body: payloadString });
      return await response.json();
    }

    function onScanSuccess(decodedText, decodedResult) {
      if (isProcessing) return; 
      
      const parts = decodedText.split('|');
      if (parts.length !== 2) { showError("QR Code ไม่ถูกต้อง"); return; }

      const uid = parts[0];
      const expireTime = parseInt(parts[1]);

      if (Date.now() > expireTime) { showError("QR Code หมดอายุให้ผู้ใช้เปิดใหม่"); return; }

      isProcessing = true;
      html5QrcodeScanner.pause(true); 
      document.getElementById('statusMsg').innerText = "กำลังบันทึกแสตมป์...";
      document.getElementById('statusMsg').className = "text-blue-400 font-bold animate-pulse";

      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      callBackend('addStamp', { userId: uid }).then(res => {
          if (res.success) {
            Swal.fire({ title: 'สำเร็จ! ✅', text: res.message, icon: 'success', timer: 2000, showConfirmButton: false }).then(() => resumeScanner());
          } else {
            Swal.fire('แจ้งเตือน', res.message, 'warning').then(() => resumeScanner());
          }
        }).catch(err => { Swal.fire('ขัดข้อง', err.message, 'error').then(() => resumeScanner()); });
    }

    function showError(msg) {
      isProcessing = true; html5QrcodeScanner.pause(true);
      Swal.fire({ title: 'ไม่อนุญาต ❌', text: msg, icon: 'error', confirmButtonColor: '#ef4444', confirmButtonText: 'สแกนคิวต่อไป' }).then(() => resumeScanner());
    }

    function resumeScanner() {
      isProcessing = false;
      document.getElementById('statusMsg').innerText = "พร้อมสแกนคิวต่อไป...";
      document.getElementById('statusMsg').className = "text-green-400 font-bold animate-pulse";
      html5QrcodeScanner.resume();
    }

    window.onload = () => {
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 }, false);
      html5QrcodeScanner.render(onScanSuccess, () => {});
    };
  </script>
</body>
</html>
