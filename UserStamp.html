<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passport สุขภาพ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f0fdf4; }
    .stamp-box { transition: all 0.3s ease; }
    .stamp-active { background-color: #22c55e; color: white; transform: scale(1.05); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .stamp-inactive { background-color: #e5e7eb; color: #9ca3af; }
  </style>
</head>
<body class="p-4 pb-10">

  <div id="loading" class="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center">
    <div class="animate-spin inline-block w-12 h-12 border-[4px] border-green-600 border-t-transparent rounded-full"></div>
    <p class="mt-4 text-gray-700 font-semibold">กำลังโหลดข้อมูล...</p>
  </div>

  <div id="notLinkedSection" class="hidden text-center mt-20 bg-white p-6 rounded-2xl shadow-lg">
    <div class="text-5xl mb-4">🔒</div>
    <h2 class="text-xl font-bold text-gray-800 mb-2">ยังไม่ได้ผูกบัญชี</h2>
    <p class="text-gray-600 mb-6 text-sm">คุณต้องทำการผูกบัญชีกับระบบก่อน จึงจะสามารถเข้าร่วมกิจกรรมสะสมแต้มได้ครับ</p>
    <button onclick="goToRegister()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-green-700">ไปหน้าผูกบัญชี</button>
  </div>

  <div id="stampSection" class="hidden max-w-md mx-auto">
    
    <div class="bg-white rounded-3xl shadow-lg p-6 mb-6 text-center border-t-4 border-green-500">
      <h1 class="text-2xl font-bold text-green-700 mb-1">Passport สุขภาพ</h1>
      <p id="userNameDisplay" class="text-gray-800 font-semibold text-lg mb-4">-</p>
      
      <div class="bg-gray-50 p-4 rounded-2xl inline-block mb-2 shadow-inner">
        <div id="qrcodeDisplay" class="mx-auto flex justify-center"></div>
      </div>
      
      <p id="timerDisplay" class="text-sm font-bold text-red-500 mt-2">QR Code รีเฟรชใน: 60 วิ</p>
      <p class="text-xs text-gray-500 mt-1">ยื่น QR Code นี้ให้เจ้าหน้าที่สแกนเพื่อรับแสตมป์</p>
    </div>

    <div class="bg-white rounded-3xl shadow-lg p-6 border-t-4 border-blue-500">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold text-gray-800">แสตมป์สะสมของคุณ</h2>
        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full"><span id="stampCount">0</span>/14 ครั้ง</span>
      </div>
      
      <div id="stampGrid" class="grid grid-cols-4 gap-3">
        </div>
    </div>

  </div>

  <script>
    // ⚠️ 1. ใส่ข้อมูลตั้งค่าของคุณที่นี่
    const LIFF_ID_STAMP = "2010469434-OPy0wuua"; 
    const URL_REGISTER_LIFF = "https://liff.line.me/2010419960-jJFrolbW"; // ให้กดแล้วเด้งไปหน้าผูกบัญชี
    const GAS_BACKEND_URL = "https://script.google.com/macros/s/AKfycbwe0c85_shFvZ8UnH1Rqk1GLDc33xsWqNlUXuRi2ezkaIb9IBXKyn2HXXXP8Z70IpWo/exec"; 

    let globalUserId = "";
    let currentStamps = 0;
    let qrCodeObj = null;
    let refreshInterval = null;
    let fetchInterval = null;
    let secondsLeft = 60;

    async function callBackend(action, data = {}) {
      const payloadString = JSON.stringify({ action: action, ...data });
      const response = await fetch(GAS_BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: payloadString
      });
      return await response.json();
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID_STAMP });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        
        const profile = await liff.getProfile();
        globalUserId = profile.userId;

        loadStampData(true); // โหลดครั้งแรก (โชว์ Loading)
        
        // ตั้งเวลารีเฟรชข้อมูลทุกๆ 3 วินาที (รอเจ้าหน้าที่สแกน)
        fetchInterval = setInterval(() => loadStampData(false), 3000);

      } catch (err) {
        Swal.fire("ข้อผิดพลาด", err.message, "error");
      }
    }

    function loadStampData(showLoading = false) {
      if (showLoading) document.getElementById('loading').classList.remove('hidden');
      
      callBackend('getUserStamp', { userId: globalUserId })
        .then(res => {
          document.getElementById('loading').classList.add('hidden');
          
          if (!res.isLinked) {
            document.getElementById('notLinkedSection').classList.remove('hidden');
            clearInterval(fetchInterval); // หยุดรีเฟรชถ้ายังไม่ผูกบัญชี
            return;
          }

          document.getElementById('stampSection').classList.remove('hidden');
          document.getElementById('userNameDisplay').innerText = res.name;
          
          // ถ้ามีแสตมป์เพิ่มขึ้น ให้เล่นเอฟเฟกต์แจ้งเตือน
          if (res.stamps > currentStamps && !showLoading) {
            Swal.fire({
              title: 'ยินดีด้วย! 🎉',
              text: `คุณได้รับแสตมป์ครั้งที่ ${res.stamps} แล้ว`,
              icon: 'success',
              timer: 3000,
              showConfirmButton: false
            });
          }
          currentStamps = res.stamps;
          renderStamps(currentStamps);

          // สร้าง QR Code ครั้งแรก
          if (showLoading) generateSecureQR();

        }).catch(err => { console.log(err); });
    }

    function renderStamps(count) {
      document.getElementById('stampCount').innerText = count;
      const grid = document.getElementById('stampGrid');
      grid.innerHTML = ''; // ล้างของเก่า

      for (let i = 1; i <= 14; i++) {
        const div = document.createElement('div');
        if (i <= count) {
          // ช่องที่ได้แสตมป์แล้ว
          div.className = 'stamp-box stamp-active aspect-square rounded-2xl flex flex-col items-center justify-center';
          div.innerHTML = `<span class="text-2xl mb-1">🏆</span><span class="text-[10px] font-bold">ครั้งที่ ${i}</span>`;
        } else {
          // ช่องที่ยังไม่ได้
          div.className = 'stamp-box stamp-inactive aspect-square rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-gray-300';
          div.innerHTML = `<span class="text-xl mb-1 opacity-50">🔒</span><span class="text-[10px] font-semibold">ครั้งที่ ${i}</span>`;
        }
        grid.appendChild(div);
      }
    }

    function generateSecureQR() {
      // สร้าง Payload : UID|เวลาหมดอายุ (ปัจจุบัน + 60 วินาที)
      const expireTime = Date.now() + (60 * 1000); 
      const qrData = `${globalUserId}|${expireTime}`;

      document.getElementById('qrcodeDisplay').innerHTML = ''; // ล้างของเก่า
      qrCodeObj = new QRCode(document.getElementById('qrcodeDisplay'), {
        text: qrData,
        width: 180,
        height: 180,
        colorDark : "#15803d",
        colorLight : "#f9fafb",
        correctLevel : QRCode.CorrectLevel.H
      });

      // รีเซ็ตตัวนับเวลา
      secondsLeft = 60;
      clearInterval(refreshInterval);
      refreshInterval = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
      secondsLeft--;
      document.getElementById('timerDisplay').innerText = `QR Code รีเฟรชใน: ${secondsLeft} วิ`;
      if (secondsLeft <= 0) {
        generateSecureQR(); // หมดเวลาให้เจเนอเรตใหม่
      }
    }

    function goToRegister() {
      window.location.href = URL_REGISTER_LIFF;
    }

    main();
  </script>
</body>
</html>
