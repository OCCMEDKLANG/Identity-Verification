<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียนเข้าร่วมกิจกรรม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
    .stamp-circle { transition: transform 0.2s; }
    .stamp-circle:active { transform: scale(0.95); }
    .gacha-box { animation: float 2s ease-in-out infinite; }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
  </style>
</head>
<body class="pb-10">

  <div id="loading" class="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center">
    <div class="animate-spin inline-block w-12 h-12 border-[4px] border-green-600 border-t-transparent rounded-full"></div>
    <p class="mt-4 text-gray-700 font-semibold">กำลังเชื่อมต่อ...</p>
  </div>

  <div id="notLinkedSection" class="hidden text-center mt-20 p-6">
    <div class="text-5xl mb-4">🔒</div>
    <h2 class="text-xl font-bold text-gray-800 mb-2">ยังไม่ได้ผูกบัญชี</h2>
    <p class="text-gray-600 mb-6 text-sm">กรุณาผูกบัญชีกับระบบก่อนเข้าร่วมกิจกรรมครับ</p>
    <button onclick="window.location.href='index.html?from=stamp'" class="w-full max-w-xs bg-green-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-green-700">ไปหน้าผูกบัญชี</button>
  </div>

  <div id="stampSection" class="hidden max-w-md mx-auto bg-white min-h-screen shadow-md">
    
    <div class="bg-gradient-to-b from-[#4caf50] to-[#22c55e] px-6 pt-8 pb-10 rounded-b-[35px] shadow-sm relative text-center text-white">
      <div class="w-16 h-16 mx-auto bg-white rounded-full shadow-md mb-3 flex items-center justify-center text-3xl">🏃‍♂️</div>
      <h2 id="userNameDisplay" class="text-xl font-bold">กำลังโหลดชื่อ...</h2>
      <p class="text-sm opacity-90 mb-4">Aerobic Dance @ KLANG</p>
      
      <div class="bg-white/20 backdrop-blur-sm rounded-2xl p-4 text-center border border-white/30">
        
        <div class="bg-white p-3 rounded-xl shadow-sm inline-block cursor-pointer hover:scale-105 transition-transform mb-3" onclick="showBigQR()">
          <div id="qrcodeDisplay" class="flex justify-center mx-auto"></div>
          <div class="text-[12px] text-gray-800 mt-1 font-bold" id="timerDisplay">รีเฟรช 60s</div>
        </div>

        <div class="flex justify-center items-center gap-2">
          <span class="bg-[#166534] text-white text-[12px] px-3 py-1 rounded-md font-bold shadow-sm">🎁 สะสมแสตมป์</span>
          <div class="text-sm font-semibold">มีแล้ว <span id="stampCountText" class="text-3xl font-bold text-yellow-300 mx-1 drop-shadow-md">0</span> ดวง</div>
        </div>

      </div>
    </div>

    <div id="gachaSection" class="hidden -mt-5 mx-6 relative z-10 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-2xl shadow-lg p-4 text-center text-white">
      <div class="absolute -right-2 -top-2 text-5xl opacity-30">🎁</div>
      <h3 class="font-bold text-md">คุณมีสิทธิ์ลุ้นรางวัล! <span id="ticketCount" class="bg-red-500 text-white rounded-full px-2 text-xs">0</span></h3>
      <button onclick="playGacha()" class="mt-2 bg-white text-orange-600 text-sm font-bold px-6 py-2 rounded-full shadow-md hover:scale-105 transition-transform">กดเปิดกล่องเลย!</button>
    </div>

    <div class="p-6">
      <div class="flex justify-between items-center mb-4 border-b pb-2">
        <h3 class="font-bold text-gray-800">สแตมป์เข้าร่วมกิจกรรม (รวม 14 ครั้ง)</h3>
      </div>

      <div id="stampGrid" class="grid grid-cols-4 gap-y-6 gap-x-2"></div>

      <div class="mt-8 flex justify-center gap-4 text-[10px] text-gray-500 bg-gray-50 py-2 rounded-lg">
        <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-green-500"></div> เข้าร่วมแล้ว</div>
        <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-[#166534]"></div> ใช้สิทธิ์แลกแล้ว</div>
        <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-red-100 border border-red-300"></div> ไม่ได้เข้าร่วม</div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ ใส่ LIFF ID แสตมป์ และ URL ของ API แสตมป์ (Web app ตัวล่าสุด)
    const LIFF_ID_STAMP = "2010469434-OPy0wuua";
    const GAS_BACKEND_URL = "https://script.google.com/macros/s/AKfycbwe0c85_shFvZ8UnH1Rqk1GLDc33xsWqNlUXuRi2ezkaIb9IBXKyn2HXXXP8Z70IpWo/exec"; 

    const dateLabels = ['1 ก.ค.', '8 ก.ค.', '13 ก.ค.', '20 ก.ค.', '27 ก.ค.', '3 ส.ค.', '13 ส.ค.', '19 ส.ค.', '26 ส.ค.', '2 ก.ย.', '9 ก.ย.', '16 ก.ย.', '23 ก.ย.', '30 ก.ย.'];
    let globalUserId = "";
    let currentStamps = 0;
    let secondsLeft = 60;
    let refreshInterval = null;
    let fetchInterval = null;

    async function callBackend(action, data = {}) {
      const payloadString = JSON.stringify({ action: action, ...data });
      const response = await fetch(GAS_BACKEND_URL, { method: 'POST', body: payloadString });
      return await response.json();
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID_STAMP });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        globalUserId = (await liff.getProfile()).userId;

        loadStampData(true);
        // 🌟 ยืดเวลารีเฟรชเป็น 15 วินาที เพื่อลดภาระการประมวลผลบนมือถือ Android
        fetchInterval = setInterval(() => loadStampData(false), 15000); 
      } catch (err) { Swal.fire("ข้อผิดพลาด", err.message, "error");
      }
    }

    function loadStampData(showLoading = false) {
      if (showLoading) document.getElementById('loading').classList.remove('hidden');
      callBackend('getUserStamp', { userId: globalUserId }).then(res => {
        document.getElementById('loading').classList.add('hidden');
        if (!res.isLinked) { document.getElementById('notLinkedSection').classList.remove('hidden'); clearInterval(fetchInterval); return; }

        document.getElementById('stampSection').classList.remove('hidden');
        document.getElementById('userNameDisplay').innerText = res.name; // นำชื่อมาแสดงที่นี่
        
        if (res.stamps > currentStamps && !showLoading) {
          if (res.stamps % 5 === 0) Swal.fire('ยอดเยี่ยม! 🏆', `สะสมครบ ${res.stamps} ดวง ได้รับ 1 สิทธิ์เปิดกล่อง!`, 'success');
          else Swal.fire('สำเร็จ! ✅', `ได้รับแสตมป์ดวงที่ ${res.stamps} แล้ว`, 'success');
        }
        currentStamps = res.stamps;
        document.getElementById('stampCountText').innerText = currentStamps;
        
        // ส่ง tickets เข้าไปเพื่อคำนวณว่าแลกไปแล้วกี่ดวง
        renderStamps(res.history, currentStamps, res.tickets);
        
        if (res.tickets > 0) { document.getElementById('gachaSection').classList.remove('hidden'); document.getElementById('ticketCount').innerText = res.tickets; } 
        else { document.getElementById('gachaSection').classList.add('hidden');
        }

        if (showLoading) generateSecureQR();

      }).catch(err => console.log(err));
    }

    // วาดดวงแสตมป์ พร้อมเช็คสถานะ "ใช้แล้ว"
    function renderStamps(historyArray, totalStamps, availableTickets) {
      const grid = document.getElementById('stampGrid');
      grid.innerHTML = ''; 

      // คำนวณจำนวนแสตมป์ที่ถูกแปลงเป็นตั๋วและกดใช้ไปแล้ว (1 สิทธิ์ = 5 ดวง)
      let earnedTickets = Math.floor(totalStamps / 5);
      let usedTickets = earnedTickets - availableTickets;
      let redeemedStampsCount = usedTickets * 5; 
      
      let stampedCounter = 0;
      historyArray.forEach((status, index) => {
        const div = document.createElement('div');
        div.className = 'flex flex-col items-center stamp-circle relative';
        
        let circleClass, icon, badgeHtml = '';

        if (status === 'stamped') {
          stampedCounter++;
          
          if (stampedCounter <= redeemedStampsCount) {
            // แสตมป์ที่ถูกใช้สิทธิ์เปิดกล่องไปแล้ว (สีเขียวเข้ม + กล่องของขวัญ + ป้ายกำกับ)
            circleClass = 'bg-[#166534] text-white border-2 border-[#14532d] shadow-sm opacity-90';
            icon = '<span class="text-xl">🎁</span>';
            badgeHtml = '<div class="absolute -top-2 -right-2 bg-yellow-500 text-white text-[8px] px-1.5 py-0.5 rounded border border-white font-bold shadow-sm transform rotate-12">ใช้แล้ว</div>';
          } else {
            // แสตมป์ปกติที่เพิ่งได้รับ
            circleClass = 'bg-green-500 text-white border-2 border-green-600 shadow-sm';
            icon = '<svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>';
          }
        } else if (status === 'missed') {
          circleClass = 'bg-red-50 text-red-400 border-2 border-red-200 border-dashed';
          icon = '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
        } else {
          circleClass = 'bg-gray-50 text-gray-300 border-2 border-gray-200';
          icon = '<svg class="w-5 h-5 opacity-60" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>';
        }

        div.innerHTML = `
          <div class="w-[52px] h-[52px] rounded-full flex items-center justify-center ${circleClass} mb-1 relative">
            ${icon}
            ${badgeHtml}
          </div>
          <span class="text-[10px] ${status === 'missed' ? 'text-red-400 font-bold' : 'text-gray-500 font-semibold'}">
            ${status === 'missed' ? 'ขาด' : dateLabels[index]}
          </span>
        `;
        grid.appendChild(div);
      });
    }

    function playGacha() {
      // 🌟 ยกเลิกระบบสุ่มหลังบ้าน และเปลี่ยนมาโชว์ Popup แจ้งเตือนสิทธิ์ลุ้นรางวัลแทน
      Swal.fire({
        title: '🎉 ท่านได้สิทธิ์ลุ้นรางวัลแล้ว!',
        html: `
          <div class="gacha-box text-6xl mt-2 mb-4 drop-shadow-lg">🎁</div>
          <p class="text-sm text-gray-700 font-semibold leading-relaxed">
            สามารถติดตามประกาศผลรางวัลได้วันที่<br>
            <span class="text-green-600 font-bold text-base bg-green-50 px-2 py-1 rounded">30 กันยายน 2569</span><br><br>
            หรือ ติดตามการจับรางวัลได้ที่<br>
            <span class="text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded">ห้องประชุมเทเวศรวงวิวัฒน์</span>
          </p>
        `,
        confirmButtonText: 'รับทราบ',
        confirmButtonColor: '#16a34a'
      });
    }

    // สร้าง QR Code ขนาดใหญ่ 140x140 พิกเซล
    function generateSecureQR() {
      const expireTime = Date.now() + (60 * 1000);
      document.getElementById('qrcodeDisplay').innerHTML = ''; 
      new QRCode(document.getElementById('qrcodeDisplay'), { 
        text: `${globalUserId}|${expireTime}`, 
        width: 140, 
        height: 140, 
        colorDark : "#166534", 
        colorLight : "#ffffff", 
        correctLevel : QRCode.CorrectLevel.M 
      });
      secondsLeft = 60;
      clearInterval(refreshInterval);
      refreshInterval = setInterval(() => {
        secondsLeft--; document.getElementById('timerDisplay').innerText = `รีเฟรช ${secondsLeft}s`;
        if (secondsLeft <= 0) generateSecureQR(); 
      }, 1000);
    }

    function showBigQR() {
      const expireTime = Date.now() + (60 * 1000);
      const qrData = `${globalUserId}|${expireTime}`;
      
      Swal.fire({
        title: 'ยื่นให้เจ้าหน้าที่สแกน',
        html: '<div id="bigQrCode" class="flex justify-center mt-4 mb-2"></div><p class="text-xs text-gray-500">QR Code จะเปลี่ยนใหม่ทุก 60 วินาที เพื่อความปลอดภัย</p>',
        showConfirmButton: true,
        confirmButtonText: 'ปิดหน้าต่าง',
        confirmButtonColor: '#16a34a',
        didOpen: () => {
          new QRCode(document.getElementById('bigQrCode'), {
            text: qrData, width: 220, height: 220, colorDark : "#166534", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.M
          });
        }
      });
    }

    main();
  </script>
</body>
</html>
